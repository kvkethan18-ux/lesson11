<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: arial;
            background-color: #f0ede8;
            padding: 30px;
            margin: 0;
        }

        h1{
            text-align:center;
            color: #3d2b1f;
            margin-bottom: 20px;
        }

        .room{
            width: 900px;
            border: 4px solid #8d6e63;
            padding: 16px;
            margin: 0 auto;
            background-color: #fff8f0;
            overflow: hidden;
        }

        .bed{
            width: 160px;
            background-color: #6d4c41;
            color: white;
            padding: 20px;
            text-align: center;
        
        
        float:left
        margin-right: 16px;
        }
        
        .window{
            width: 80px;
            background-color: #1976d2;
            color: white;
            padding: 40px;
            text-align: top right;
        
        float: right;
        margin-left: 16px;
        }

        .description{
            color: #5d4037;
            font-size: 0.9em;
        }

        .rug{
            background-color: #d35400;
            color: white;
            padding: 14px;
            text-align: center;
            font-weight: bold;

            clear: both;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>My dream room</h1>

    <div class="room">
        <div class="bed">🛏️<br>bed</div>

        <div class="window">window</div>

        <div class="description">
            Welcome to my dream room!I love the sun comes through every morning.
            my bed super cosy with star pattern pillows. 🌟  
        </div>

        <div class="rug">🟠  Fluffy Orange Rug🟠</div>


    </div>


</body>
</html>
