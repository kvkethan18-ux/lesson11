<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Animal Facts</title>
    <style>
        body{
            background-color: darkgreen;
            font-family: Arial, sans-serif;
        }

        .fact-file{
            background-color: lightyellow;
            color: darkslategray;
            width: 260px;
            padding: 70px;
            border: 4px solid forestgreen;
            margin: 120px;
        }

       .animal-name{
            color: forestgreen;
            font-size: 22px;
        }

        .detail{
            color: darkslategray;
        }

        .coolfact{
            color: darkorange;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="fact-file">
        <h2 class="animal-name">snow leopard</h2>
        <p class="detail">type:Big cat</p>
        <p class="detail">lives in:mountainous regions of Central Asia</p>
        <p class="detail">Diet:Deer,Goat,wild sheep</p>
        <p class="coolfact">cool fact:Can leap up to 15 meters in one jump</p>
    </div>
</body>
</html>
